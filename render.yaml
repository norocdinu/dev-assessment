# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys: managed Postgres + Fastify API (Docker) + Next.js web (Docker).
#
# IMPORTANT — public URLs are predicted from the service names below.
# Render assigns https://<service-name>.onrender.com IF the name is globally
# unique. If a name is already taken, Render appends a random suffix; in that
# case update NEXT_PUBLIC_API_URL and WEB_URL to the real URLs and redeploy
# (NEXT_PUBLIC_API_URL is baked at build time, so the web service must rebuild).

databases:
  - name: dev-assessment-db
    plan: free
    databaseName: dev_assessment
    user: dev_assessment

services:
  # ── API (Fastify) ──────────────────────────────────────────────────────────
  - type: web
    name: dev-assessment-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dev-assessment-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      # Used for the CORS allow-list. Must exactly match the web origin
      # (scheme + host, no trailing slash).
      - key: WEB_URL
        value: https://dev-assessment-web.onrender.com

  # ── Web (Next.js standalone) ───────────────────────────────────────────────
  - type: web
    name: dev-assessment-web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    envVars:
      # Render passes env vars as Docker build args, and the web Dockerfile
      # declares `ARG NEXT_PUBLIC_API_URL` — so this is baked into the client
      # bundle at build time (the browser calls the API directly).
      - key: NEXT_PUBLIC_API_URL
        value: https://dev-assessment-api.onrender.com
